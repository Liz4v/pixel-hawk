name: Deploy

on:
  push:
    branches: [main]

defaults:
  run:
    working-directory: ~/pixel-hawk

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Stop service
        run: sudo systemctl stop pixel-hawk

      - name: Pull latest
        run: git pull

      - name: Sync dependencies
        run: uv sync --quiet

      - name: Run migrations
        run: uv run aerich upgrade

      - name: Start service
        run: sudo systemctl start pixel-hawk

      - name: Verify
        run: sleep 3 && sudo systemctl is-active pixel-hawk

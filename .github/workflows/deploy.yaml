# Auto-deploy on push to main via Tailscale + SSH.
#
# Uses a GitHub-hosted runner that joins the tailnet to reach the
# production host, then SSHes as the deploy user to run each step.
#
# The following GitHub Actions repository variables must be set:
#   DEPLOY_HOST            — Tailscale hostname or IP of the target (e.g. homelab1)
#   DEPLOY_USER            — OS user that owns the repo clone (e.g. deploy)
#   DEPLOY_DIR             — absolute path to the repo clone (e.g. /home/deploy/pixel-hawk)
#   SERVICE_NAME           — systemd service name (e.g. pixel-hawk)
#   SERVICE_USER           — OS user that runs the service (e.g. pixel-hawk)
#   NEST_DIR               — absolute path to the data directory (e.g. /var/local/pixel-hawk/nest)
#   UV_BIN                 — absolute path to uv binary (e.g. /home/deploy/.local/bin/uv)
#   UV_PYTHON_INSTALL_DIR  — (optional) where uv stores Python installations (e.g. /home/deploy/.local/share/uv/python)
#
# The following GitHub Actions repository secrets must be set:
#   TS_OAUTH_CLIENT_ID  — Tailscale OAuth client ID (devices scope, tag:ci)
#   TS_OAUTH_SECRET     — Tailscale OAuth client secret
#   DEPLOY_SSH_KEY      — ed25519 private key authorized for DEPLOY_USER@DEPLOY_HOST

name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Join tailnet
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ vars.DEPLOY_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Stop service
        run: ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} "sudo systemctl stop ${{ vars.SERVICE_NAME }}"

      - name: Pull latest
        run: ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} "cd ${{ vars.DEPLOY_DIR }} && git fetch origin main && git reset --hard origin/main"

      - name: Sync dependencies
        env:
          UV_PYTHON_INSTALL_DIR: ${{ vars.UV_PYTHON_INSTALL_DIR }}
        run: >
          ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}
          "cd ${{ vars.DEPLOY_DIR }} && ${UV_PYTHON_INSTALL_DIR:+UV_PYTHON_INSTALL_DIR=$UV_PYTHON_INSTALL_DIR} UV_PYTHON_PREFERENCE=only-system ${{ vars.UV_BIN }} sync --quiet"

      - name: Ensure nest symlink
        run: >
          ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }}
          "cd ${{ vars.DEPLOY_DIR }} && ln -sfn ${{ vars.NEST_DIR }} nest"

      - name: Start service
        run: ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} "sudo systemctl start ${{ vars.SERVICE_NAME }}"

      - name: Verify
        run: ssh ${{ vars.DEPLOY_USER }}@${{ vars.DEPLOY_HOST }} "sleep 3 && sudo systemctl is-active ${{ vars.SERVICE_NAME }}"
